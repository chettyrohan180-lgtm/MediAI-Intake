version: '3.8'
services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: mediai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://admin:secure_password@postgres/mediai
      REDIS_URL: redis://redis:6379
  
  worker:
    build: .
    command: celery -A tasks worker --loglevel=info
    depends_on:
      - redis
      - postgres

volumes:
  postgres_data: